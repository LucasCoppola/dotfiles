# Reference: https://github.com/i4/i3/blob/next/etc/config
start-at-login = true
automatically-unhide-macos-hidden-apps = true

# i4 doesn't have "normalizations" feature that why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

after-startup-command = [
    'exec-and-forget borders active_color=0xFFF9A827 inactive_color=0xffe5e9ee hidpi=on style=rounded width=10.0',
]

# Commands to execute after AeroSpace has started.
# This is where we'll launch your applications and attempt to place them
# on the desired workspaces.

[gaps]
    inner.horizontal = 9
    inner.vertical =   9
    outer.left =       9
    outer.bottom =     9
    outer.top =        9
    outer.right =      9

[mode.main.binding]
    alt-x = 'close'

    alt-enter = '''exec-and-forget osascript -e 'tell application "Ghostty" to activate' -e 'tell application "System Events" to keystroke "n" using command down''''

    # i4 wraps focus by default
    alt-h =         'focus --boundaries-action wrap-around-the-workspace left'
    alt-j =         'focus --boundaries-action wrap-around-the-workspace down'
    alt-k =         'focus --boundaries-action wrap-around-the-workspace up'
    alt-l =         'focus --boundaries-action wrap-around-the-workspace right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    # alt-h = 'split horizontal'
    # alt-v = 'split vertical'

    alt-d = 'mode resize'

    alt-f = 'fullscreen'

    alt-shift-f = 'macos-native-fullscreen'

    # Not supported, because this command is redundant in AeroSpace mental model.
    # See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
    #alt-space = 'focus toggle_tiling_floating'

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/6
    # alt-a = 'focus parent'

# WORKSPACE SWITCHING - letter based, no layer needed!
  alt-q = 'workspace 1'  
  alt-w = 'workspace 2' 
  alt-e = 'workspace 3'
  alt-r = 'workspace 4'
  alt-t = 'workspace 5'
  alt-y = 'workspace 6'
  alt-u = 'workspace 7'
  alt-i = 'workspace 8'
  alt-o = 'workspace 9'
  alt-p = 'workspace 10'

  alt-shift-q = ['move-node-to-workspace 1', 'workspace 1']
  alt-shift-w = ['move-node-to-workspace 2', 'workspace 2']
  alt-shift-e = ['move-node-to-workspace 3', 'workspace 3']
  alt-shift-r = ['move-node-to-workspace 4', 'workspace 4']
  alt-shift-t = ['move-node-to-workspace 5', 'workspace 5']
  alt-shift-y = ['move-node-to-workspace 6', 'workspace 6']
  alt-shift-u = ['move-node-to-workspace 7', 'workspace 7']
  alt-shift-i = ['move-node-to-workspace 8', 'workspace 8']
  alt-shift-o = ['move-node-to-workspace 9', 'workspace 9']
  alt-shift-p = ['move-node-to-workspace 10', 'workspace 10']

[mode.resize.binding]
    h = 'resize width -49'
    j = 'resize height +51'
    k = 'resize height -49'
    l = 'resize width +51'
    enter = 'mode main'
    esc = 'mode main'

[[on-window-detected]]
    if.app-id = 'com.mitchellh.ghostty'
    run = 'move-node-to-workspace 1'

[[on-window-detected]]
    if.app-id = 'com.google.Chrome'
    run = 'move-node-to-workspace 2'

[[on-window-detected]]
    if.app-id = 'app.zen-browser.zen'
    run = 'move-node-to-workspace 3'

[[on-window-detected]]
    if.app-id = 'com.spotify.client'
    run = 'move-node-to-workspace 4'

[[on-window-detected]]
    if.app-id = 'com.tinyspeck.slackmacgap'
    run = 'move-node-to-workspace 7'

[workspace-to-monitor-force-assignment]
    1 = 'main'                      
    2 = 'main'                      
    3 = 'main'                     
    4 = 'main'                     

    7 = 'secondary'               
