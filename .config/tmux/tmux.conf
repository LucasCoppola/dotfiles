# ── Terminal ──────────────────────────────────────────────────────────────────

set -g default-terminal "${TERM}"
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Extended keys (CSI u) — enables Shift+Enter, Ctrl+Shift+<key>, etc. in Neovim
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'


# ── Behavior ──────────────────────────────────────────────────────────────────

set -s escape-time 0        # no delay when pressing Esc in Neovim
set -g focus-events on      # tell Neovim when tmux gains/loses focus
set -g set-clipboard on     # sync copy-mode yanks with system clipboard
set -g allow-passthrough on # let apps send special escape sequences (e.g. image preview)
set -g mouse on
set -g detach-on-destroy off
set -g history-limit 50000
set -g status-interval 5


# ── Windows & Panes ───────────────────────────────────────────────────────────

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on  # don't shrink a window just because another client is smaller

# ── Status Bar ────────────────────────────────────────────────────────────────

set -g status-position top
set -g status-left-length 200
set -g status-left "#{?client_prefix,#[fg=##9705f7],#[fg=#c792ea]} #{session_name}  "
set -g status-style "fg=#c792ea"
set -g status-right ""

set -g window-status-format         "#{window_index}:#{window_name}#{window_flags} "
set -g window-status-current-format "#{window_index}:#{window_name} "
set -g window-status-style          "fg=#6E6C7E"
set -g window-status-last-style     "fg=#6E6C7E"
set -g window-status-current-style  "fg=#84ffff"


# ── Prefix ────────────────────────────────────────────────────────────────────

set -g prefix C-Space
unbind C-\;
bind C-Space send-prefix  # pass C-Space through to apps that need it


# ── General Bindings ──────────────────────────────────────────────────────────

set -g mode-keys vi

bind r source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"
bind c new-window -c "#{pane_current_path}"
bind X kill-session


# ── Pane Bindings ─────────────────────────────────────────────────────────────

bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation (vim keys)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z  # zoom/unzoom current pane


# ── Window Bindings ───────────────────────────────────────────────────────────

# Direct window selection (top-row left hand — ideal for Corne)
bind-key -r q select-window -t 1
bind-key -r w select-window -t 2
bind-key -r e select-window -t 3
bind-key -r r select-window -t 4
bind-key -r t select-window -t 5

bind Space last-window  # toggle between two most recent windows


# ── Session Bindings ──────────────────────────────────────────────────────────

bind n switch-client -n   # next session
bind p switch-client -p   # previous session
bind b switch-client -l   # toggle between two most recent sessions


# ── Copy Mode ─────────────────────────────────────────────────────────────────

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection


# ── Plugins ───────────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
