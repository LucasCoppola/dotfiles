$mainMod = ALT 

# Application bindings
$terminal = uwsm app -- ghostty
$browser = omarchy-launch-browser

windowrule = workspace 1, match:class ^(ghostty)$
windowrule = workspace 2, match:class ^(zen)$  
windowrule = workspace 3, match:class ^(Spotify)$

windowrule = suppress_event maximize, match:class .*

unbind = SUPER, F
bindd = $mainMod SHIFT, F, Force full screen, fullscreen, 0
unbind = SUPER ALT, F
bindd = $mainMod, F, Full width, fullscreen, 1

# Launch applications
# bindd = $mainMod, return, Terminal, exec, $terminal --dir=$(omarchy-cmd-terminal-cwd)
bindd = $mainMod, return, Terminal, exec, $terminal --working-directory=$(omarchy-cmd-terminal-cwd)
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify

bindd = SUPER SHIFT, C, Claude, exec, omarchy-launch-webapp "https://claude.com/"
unbind = SUPER, W
bindd = SUPER, W, Whatsapp, exec, omarchy-launch-webapp "https://web.whatsapp.com/"
bindd = SUPER, L, Local, exec, omarchy-launch-webapp "http://localhost:3000/"

# System controls
bindd = $mainMod, S, Suspend, exec, systemctl suspend
bind = $mainMod, X, killactive,

unbind = SUPER, SPACE
bind = $mainMod, SPACE, exec, walker -p "Start…",

unbind = SUPER, ESCAPE
bind = $mainMod, P, exec, omarchy-menu system,

unbind = SUPER, ALT, SPACE
bindd = SUPER, A, Omarchy menu, exec, omarchy-menu

# Move focus with mainMod + hjkl (vim keys)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows with mainMod + SHIFT + hjkl
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, Q, workspace, 1
bind = $mainMod, W, workspace, 2
bind = $mainMod, E, workspace, 3
bind = $mainMod, R, workspace, 4
bind = $mainMod, T, workspace, 5

bind = $mainMod, code:20, resizeactive, -100 0  # - key 
bind = $mainMod, code:21, resizeactive, 100 0  # - key 

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, Q, movetoworkspace, 1
bind = $mainMod SHIFT, W, movetoworkspace, 2
bind = $mainMod SHIFT, E, movetoworkspace, 3
bind = $mainMod SHIFT, R, movetoworkspace, 4
bind = $mainMod SHIFT, T, movetoworkspace, 5


# unbind moving to workspaces (default way)
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19
unbind = SUPER, code:20
unbind = SUPER, code:21

# doesnt work for some reason
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21
