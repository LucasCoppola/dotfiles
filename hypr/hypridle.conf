general {
    lock_cmd = true
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 0                                      # disable wait for lock
}

listener {
    timeout = 600                                              # 10min
    on-timeout = hyprctl dispatch dpms off                   # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on                     # screen on when activity is detected
}

listener {
    timeout = 3600                     # 1hr
    on-timeout = systemctl suspend     # suspend system
}
